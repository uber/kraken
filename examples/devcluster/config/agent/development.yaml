extends: base.yaml

# Use in-order piece selection so streaming reads (agent ?stream=1) get the
# earliest pieces first, sharpening time-to-first-byte. Overrides base.yaml's
# rarest_first via deep merge.
scheduler:
  dispatch:
    piece_request_policy: in_order

# Emit per-piece network events (receive_piece records the source peer) so the
# agent-to-agent P2P benchmark can prove streamed pieces flow peer->peer, not
# only origin->agent.
network_event:
  enabled: true
  log_path: /var/log/kraken/kraken-agent/networkevent.log

tracker:
  hosts:
    static:
      - host.docker.internal:15003

build_index:
  hosts:
    static:
      - host.docker.internal:15004

tls:
  name: kraken
  cas:
  - path: /etc/kraken/tls/ca/server.crt
  server:
    disabled: true
    cert:
      path: /etc/kraken/tls/ca/server.crt
    key:
      path: /etc/kraken/tls/ca/server.key
    passphrase:
      path: /etc/kraken/tls/ca/passphrase
  client:
    disabled: true
    cert:
      path: /etc/kraken/tls/client/client.crt
    key:
      path: /etc/kraken/tls/client/client.key
    passphrase:
      path: /etc/kraken/tls/client/passphrase
